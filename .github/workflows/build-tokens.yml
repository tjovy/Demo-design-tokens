name: 🔨 Build Design Tokens

on:
  push:
    branches:
      - main
    paths:
      - 'tokens.json'
      - 'package.json'
      - 'config.js'
      - 'scripts/prepare-source.js'
      - 'scripts/sanitize.js'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Donne au robot le droit de pousser du code

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🏭 Build tokens (Transform & Style Dictionary)
        run: npm run build

      - name: 💾 Commit & Push du nouveau CSS
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add build/css/variables.css
          # S'il y a des changements, on commit, sinon on continue sans erreur
          git commit -m "🤖 auto: regénération du variables.css depuis tokens.json" || echo "Aucun changement détecté dans le CSS."
          git push
